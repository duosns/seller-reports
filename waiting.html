<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在生成您的专属报告...</title>
<style>
  body{font-family:-apple-system,sans-serif;display:flex;flex-direction:column;
       align-items:center;justify-content:center;min-height:100vh;margin:0;
       background:#f5f7fa;color:#333}
  .spinner{width:48px;height:48px;border:4px solid #e0e0e0;
           border-top-color:#4A90D9;border-radius:50%;
           animation:spin 1s linear infinite;margin-bottom:24px}
  @keyframes spin{to{transform:rotate(360deg)}}
  h2{font-size:20px;margin-bottom:8px}
  p{color:#888;font-size:14px}
</style>
</head>
<body>
<div class="spinner"></div>
<h2>正在为您生成专属报告</h2>
<p>通常需要 10-20 秒，请稍候...</p>
<script>
  const id = new URLSearchParams(location.search).get('id');
  const base = 'https://duosns.github.io/seller-reports/';
  const timer = setInterval(async () => {
    try {
      const res = await fetch(base + 'report_' + id + '.html', {method:'HEAD'});
      if (res.ok) {
        clearInterval(timer);
        location.href = base + 'report_' + id + '.html';
      }
    } catch(e) {}
  }, 3000);
</script>
</body>
</html>
